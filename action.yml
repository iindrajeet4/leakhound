name: "Leakhound"
description: "Zero-dependency secret scanner — API keys, tokens, private keys — with a Thai-services rule pack (LINE, Omise, GB Prime Pay, Thai bank APIs)."
author: "iindrajeet4"
branding:
  icon: "search"
  color: "orange"

inputs:
  path:
    description: "Directory to scan"
    required: false
    default: "."
  args:
    description: "Extra CLI arguments, e.g. --json"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Run leakhound
      shell: bash
      run: node "${{ github.action_path }}/leakhound.js" "${{ inputs.path }}" ${{ inputs.args }}
